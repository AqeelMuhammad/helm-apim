kubernetes:
  secureVaultSecret:
    enabled: true
    secretName: apim-local-secure-vault

wso2:
  apim:
    secureVaultEnabled: true
    configurations:
      adminPassword: ''
      encryption:
        key: ''
        cipherTransformation: "AES/GCM/NoPadding"
        internalCryptoProvider: "org.wso2.carbon.crypto.provider.SymmetricKeyInternalCryptoProvider"
      security:
        keystores:
          primary:
            password: ''
            keyPassword: ''
          tls:
            password: ''
            keyPassword: ''
          internal:
            password: ''
            keyPassword: ''
        truststore:
          password: ''
